name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Test API
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Start backend
        working-directory: backend
        env:
          APP_ENV: test
          LIFE_USE_FIXTURES: "true"
          LIFE_TEST_AUTH_TOKEN: life-test-token
          LIFE_INTERNAL_TOKEN: internal-test-token
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8090 > ../backend.log 2>&1 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:8090/health && exit 0
            sleep 1
          done
          cat ../backend.log
          exit 1
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8090/api/v1
          VITE_LIFE_TEST_AUTH_TOKEN: life-test-token
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 3001 > ../frontend.log 2>&1 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:3001/ && exit 0
            sleep 1
          done
          cat ../frontend.log
          exit 1
      - name: Run Playwright
        working-directory: frontend
        env:
          LIFE_E2E_BASE_URL: http://127.0.0.1:3001
          LIFE_E2E_AUTH_TOKEN: life-test-token
        run: npm run test:e2e
