name: Snapshot refresh

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh deployed Life snapshots
        env:
          LIFE_API_BASE: ${{ secrets.LIFE_API_BASE }}
          LIFE_INTERNAL_TOKEN: ${{ secrets.LIFE_INTERNAL_TOKEN }}
        run: |
          if [ -z "$LIFE_API_BASE" ]; then
            echo "LIFE_API_BASE is not configured; skipping deployed refresh."
            exit 0
          fi
          curl --fail --silent --show-error "$LIFE_API_BASE/life/domains?force_refresh=true" > /tmp/life-domains.json
          curl --fail --silent --show-error "$LIFE_API_BASE/life/pipeline" > /tmp/life-pipeline.json
          if [ -n "$LIFE_INTERNAL_TOKEN" ]; then
            curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer $LIFE_INTERNAL_TOKEN" \
              "$LIFE_API_BASE/internal/alerts/evaluate" > /tmp/life-alerts.json
          else
            echo '{"alerts":"skipped"}' > /tmp/life-alerts.json
          fi
          python - <<'PY'
          import json
          for path in ["/tmp/life-domains.json", "/tmp/life-pipeline.json", "/tmp/life-alerts.json"]:
              with open(path, "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
              print(path, "ok", list(payload)[:5])
          PY
